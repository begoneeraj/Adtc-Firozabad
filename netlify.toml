[[headers]]
  for = "/*"
  [headers.values]
    # Prevent the browser from MIME-sniffing a response away from its declared Content-Type
    X-Content-Type-Options = "nosniff"
    # Block this site from being embedded in an <iframe> on another origin (clickjacking protection)
    X-Frame-Options = "SAMEORIGIN"
    # Legacy reflected-XSS filter for older browsers (no-op on modern Chrome/Firefox, harmless to keep)
    X-XSS-Protection = "1; mode=block"
    # Force HTTPS for 2 years on this domain and all subdomains; eligible for browser HSTS preload lists
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Send full referrer only on same-origin navigations; cross-origin gets just the origin, never on downgrade to HTTP
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Disable browser features this site never uses, and opt out of Google's FLoC/Topics tracking cohort
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    # Whitelist where scripts/styles/images/fonts/connections/frames/forms may load from or post to
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://adtc-firozabad.onrender.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"
