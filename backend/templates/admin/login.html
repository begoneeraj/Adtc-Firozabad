<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — ADTC Firozabad</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0d2b5e;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(26,77,162,.5) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(244,121,32,.15) 0%, transparent 50%);
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.30);
    }
    .brand {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 48px; height: 48px; border-radius: 10px;
      background: #0d2b5e;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .brand-icon svg { width: 28px; height: 28px; }
    .brand-text h1 { font-size: 1rem; font-weight: 800; color: #0d2b5e; line-height: 1.2; }
    .brand-text p  { font-size: .72rem; color: #64748b; margin-top: 2px; }
    .divider { height: 1px; background: #e2e8f0; margin-bottom: 28px; }
    .page-title { font-size: 1.25rem; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
    .page-sub   { font-size: .80rem; color: #64748b; margin-bottom: 24px; }
    .alert {
      border-radius: 6px; padding: 10px 14px;
      font-size: .80rem; font-weight: 500; margin-bottom: 18px;
    }
    .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .alert-warn  { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: .75rem; font-weight: 700; color: #374151; margin-bottom: 5px; letter-spacing: .02em; }
    .field input {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid #d1d5db; border-radius: 6px;
      font-size: .88rem; color: #1e293b;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .field input:focus { border-color: #0d2b5e; box-shadow: 0 0 0 3px rgba(13,43,94,.10); }
    .remember {
      display: flex; align-items: center; gap: 8px;
      font-size: .78rem; color: #475569; margin-bottom: 22px; cursor: pointer;
    }
    .remember input { width: 15px; height: 15px; cursor: pointer; accent-color: #0d2b5e; }
    .btn {
      width: 100%; padding: 12px;
      background: #0d2b5e; color: #fff;
      border: none; border-radius: 6px;
      font-size: .90rem; font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .btn:hover { background: #1a4da2; }
    .footer-note {
      text-align: center; margin-top: 20px;
      font-size: .70rem; color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#f47920" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>ADTC Firozabad</h1>
        <p>Accredited Driving Training Centre</p>
      </div>
    </div>
    <div class="divider"></div>
    <div class="page-title">Admin Portal</div>
    <p class="page-sub">Sign in to manage leads and view analytics.</p>

    {% if expired %}
    <div class="alert alert-warn">Your session expired. Please sign in again.</div>
    {% endif %}
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" autocomplete="on">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" required autofocus autocomplete="username"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <label class="remember">
        <input type="checkbox" name="remember"/> Remember me for 7 days
      </label>
      <button type="submit" class="btn">Sign In</button>
    </form>
    <p class="footer-note">Secured admin access — not for public use</p>
  </div>
</body>
</html>
